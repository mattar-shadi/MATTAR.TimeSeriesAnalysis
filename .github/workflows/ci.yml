name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore MATTAR.TimeSeriesAnalysis.sln

      - name: Build (Release)
        run: dotnet build MATTAR.TimeSeriesAnalysis.sln -c Release --no-restore

      - name: Test (Release)
        run: dotnet test MATTAR.TimeSeriesAnalysis.sln -c Release --no-build --no-restore
